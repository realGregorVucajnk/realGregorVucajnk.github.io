# The Site Configuration

theme: jekyll-theme-chirpy

lang: en

timezone: Europe/Ljubljana

# --- Identity ---

title: Gregor Vucajnk
tagline: This Is Not For You
description: >-
  Raw thinking at the intersection of AI, code, and whatever else
  refuses to stay quiet.
url: "https://realGregorVucajnk.github.io"

github:
  username: realGregorVucajnk

social:
  name: Gregor Vucajnk
  links:
    - https://github.com/realGregorVucajnk

# --- Appearance ---

theme_mode: dark

avatar:

toc: true

# --- Disabled (anti-marketing) ---

analytics:
  google:
    id:

comments:
  provider:

pwa:
  enabled: false
  cache:
    enabled: false

# --- Pagination ---

paginate: 10

baseurl: ""

# ------------ Do not modify below ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /blog/:year-:month-:day-:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
